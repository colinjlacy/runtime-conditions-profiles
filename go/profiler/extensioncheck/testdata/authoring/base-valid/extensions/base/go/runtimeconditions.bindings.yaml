apiVersion: runtimeconditions.io/v1alpha1
kind: RuntimeConditionsGoBinding

metadata:
  extension: https://example.com/runtimeconditions/base:v1alpha1
  extensionDefinition: ../base-v1alpha1.yaml
  language: go

go:
  importPath: github.com/example/runtimeconditions/base/go
  package: base

  constants:
    Redis: redis
    Memcached: memcached

  declarations:
    - function: Cache
      nameArg: 0
      kind: example.cache
      options:
        - function: KeyValue
          target: interface.type
          value: example.key_value
          engineArg: 0
