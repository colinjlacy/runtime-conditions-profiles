apiVersion: runtimeconditions.io/v1alpha1
kind: RuntimeConditionsBinding

metadata:
  extension: https://example.com/runtimeconditions/missing/v1alpha1/runtimeconditions.extension.yaml
  extensionDefinition: ../missing-v1alpha1.yaml
  language: go

go:
  importPath: github.com/example/runtimeconditions/missing/go
  package: missing

  declarations:
