apiVersion: runtimeconditions.io/v1alpha1
kind: RuntimeConditionsExtensionDefinition

metadata:
  uri: https://example.com/runtimeconditions/qcow2-schema-wrong-kind
  version: v1alpha1

spec:
  kinds:
    - name: block.image
  interfaceTypes:
    - name: qcow2
      targetKind: block.image
  schemas:
    - id: qcow2-cross-kind
      description: Schema intentionally targets a kind that does not own qcow2.
      appliesToKind: file.asset
      appliesToInterfaceType: qcow2
      schema:
        type: object
