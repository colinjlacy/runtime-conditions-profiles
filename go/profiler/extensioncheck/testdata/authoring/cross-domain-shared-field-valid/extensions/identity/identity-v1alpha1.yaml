apiVersion: runtimeconditions.io/v1alpha1
kind: RuntimeConditionsExtensionDefinition

metadata:
  uri: https://example.com/runtimeconditions/cross-domain-identity
  version: v1alpha1

spec:
  kinds:
    - name: identity.provider
  conditionFields:
    - name: trust
      appliesToKinds:
        - identity.provider
  fieldValues:
    - field: trust.metadata.source
      targetKind: identity.provider
      values:
        - file
        - url
        - inline_xml
