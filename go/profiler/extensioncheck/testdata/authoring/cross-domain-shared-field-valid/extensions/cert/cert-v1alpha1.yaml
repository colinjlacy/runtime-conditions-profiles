apiVersion: runtimeconditions.io/v1alpha1
kind: RuntimeConditionsExtensionDefinition

metadata:
  id: https://example.com/runtimeconditions/cross-domain-cert/v1alpha1/runtimeconditions.extension.yaml

spec:
  kinds:
    - name: cryptographic.trust
  conditionFields:
    - name: trust
      appliesToKinds:
        - cryptographic.trust
  fieldValues:
    - field: trust.store
      targetKind: cryptographic.trust
      values:
        - system
        - bundled
        - custom
