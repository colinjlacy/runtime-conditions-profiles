apiVersion: runtimeconditions.io/v1alpha1
kind: RuntimeConditionsExtensionDefinition

metadata:
  uri: https://example.com/runtimeconditions/transitive-bindings-base
  version: v1alpha1

spec:
  kinds:
    - name: transitive.bindings.cache
  interfaceTypes:
    - name: transitive.bindings.key_value
      targetKind: transitive.bindings.cache
  interfaceFields:
    - name: engine
      targetKind: transitive.bindings.cache
      targetType: transitive.bindings.key_value
  fieldValues:
    - field: interface.engine
      targetKind: transitive.bindings.cache
      targetType: transitive.bindings.key_value
      values:
        - redis
