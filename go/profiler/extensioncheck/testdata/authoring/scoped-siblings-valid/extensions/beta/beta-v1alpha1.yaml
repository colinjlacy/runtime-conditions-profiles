apiVersion: runtimeconditions.io/v1alpha1
kind: RuntimeConditionsExtensionDefinition

metadata:
  uri: https://example.com/runtimeconditions/beta
  version: v1alpha1

spec:
  kinds:
    - name: beta.object

  interfaceTypes:
    - name: beta.api
      targetKind: beta.object

  conditionFields:
    - name: configuration
      appliesToKinds:
        - beta.object
      appliesToInterfaceTypes:
        - beta.api
