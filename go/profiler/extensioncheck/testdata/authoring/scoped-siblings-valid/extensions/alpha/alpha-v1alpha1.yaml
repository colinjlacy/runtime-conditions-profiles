apiVersion: runtimeconditions.io/v1alpha1
kind: RuntimeConditionsExtensionDefinition

metadata:
  uri: https://example.com/runtimeconditions/alpha
  version: v1alpha1

spec:
  kinds:
    - name: alpha.object

  interfaceTypes:
    - name: alpha.api
      targetKind: alpha.object

  conditionFields:
    - name: configuration
      appliesToKinds:
        - alpha.object
      appliesToInterfaceTypes:
        - alpha.api
