apiVersion: runtimeconditions.io/v1alpha1
kind: RuntimeConditionsBinding

metadata:
  extension: https://example.com/runtimeconditions/transitive-app/v1alpha1/runtimeconditions.extension.yaml
  extensionDefinition: ../app-v1alpha1.yaml
  language: go

go:
  importPath: github.com/example/runtimeconditions/transitive/app/go
  package: app

  options:
    - function: Env
      target: configuration.env[]
      appliesToKinds:
        - transitive.cache
      appliesToInterfaceTypes:
        - transitive.key_value
      stringArgs:
        property: 0
        name: 1
