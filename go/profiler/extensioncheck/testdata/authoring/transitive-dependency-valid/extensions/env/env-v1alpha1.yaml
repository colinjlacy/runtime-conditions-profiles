apiVersion: runtimeconditions.io/v1alpha1
kind: RuntimeConditionsExtensionDefinition

metadata:
  uri: https://example.com/runtimeconditions/transitive-env
  version: v1alpha1

spec:
  dependencies:
    - https://example.com/runtimeconditions/transitive-base:v1alpha1
  conditionFields:
    - name: configuration
      appliesToKinds:
        - transitive.cache
      appliesToInterfaceTypes:
        - transitive.key_value
  fieldValues:
    - field: configuration.env[].property
      targetKind: transitive.cache
      targetType: transitive.key_value
      values:
        - url
