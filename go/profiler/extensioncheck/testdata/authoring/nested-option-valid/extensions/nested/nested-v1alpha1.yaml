apiVersion: runtimeconditions.io/v1alpha1
kind: RuntimeConditionsExtensionDefinition

metadata:
  uri: https://example.com/runtimeconditions/nested-options
  version: v1alpha1

spec:
  kinds:
    - name: nested.cache
  conditionFields:
    - name: configuration
      appliesToKinds:
        - nested.cache
  fieldValues:
    - field: configuration.env[].property
      targetKind: nested.cache
      values:
        - url
