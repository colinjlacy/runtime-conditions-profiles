apiVersion: runtimeconditions.io/v1alpha1
kind: RuntimeConditionsExtensionDefinition

metadata:
  uri: https://example.com/runtimeconditions/field-target-type-mismatch
  version: v1alpha1

spec:
  kinds:
    - name: field.cache
  interfaceTypes:
    - name: field.key_value
      targetKind: field.cache
  interfaceFields:
    - name: engine
      targetKind: field.cache
      targetType: field.key_value
  fieldValues:
    - field: interface.engine
      targetKind: field.cache
      targetType: field.document
      values:
        - redis
