apiVersion: runtimeconditions.io/v1alpha1
kind: RuntimeConditionsExtensionDefinition

metadata:
  uri: https://example.com/runtimeconditions/env
  version: v1alpha1

spec:
  dependencies:
    - https://example.com/runtimeconditions/base:v1alpha1

  conditionFields:
    - name: configuration
      appliesToKinds:
        - example.cache
      appliesToInterfaceTypes:
        - example.key_value

  fieldValues:
    - field: configuration.env[].property
      targetKind: example.cache
      targetType: example.key_value
      values:
        - url
        - token
