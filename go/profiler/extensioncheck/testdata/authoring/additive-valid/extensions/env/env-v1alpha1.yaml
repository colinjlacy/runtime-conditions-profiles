apiVersion: runtimeconditions.io/v1alpha1
kind: RuntimeConditionsExtensionDefinition

metadata:
  id: https://example.com/runtimeconditions/env/v1alpha1/runtimeconditions.extension.yaml

spec:
  dependencies:
    - https://example.com/runtimeconditions/base/v1alpha1/runtimeconditions.extension.yaml

  conditionFields:
    - name: configuration
      appliesToKinds:
        - example.cache
      appliesToInterfaceTypes:
        - example.key_value

  fieldValues:
    - field: configuration.env[].property
      targetKind: example.cache
      targetType: example.key_value
      values:
        - url
        - token
