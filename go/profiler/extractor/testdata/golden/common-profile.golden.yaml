apiVersion: runtimeconditions.io/v1alpha1
kind: RuntimeConditionsProfile
metadata:
    name: common-profile
workload:
    uri: github.com/example/common-profile
    version: v0.1.0
extensions:
    - https://runtimeconditions.io/extensions/common-integrations/v1alpha1/runtimeconditions.extension.yaml
conditions:
    - name: todos-api
      kind: api
      interface:
        type: http
        spec:
            format: openapi
            uri: catalog://api/default/todos
            version: 1.0.0
        operations:
            - method: GET
              path: /todos
              responseSchema:
                completed: boolean
                id: integer
                title: string
    - name: todo-cache
      kind: cache
      interface:
        type: key_value
        engine: redis
