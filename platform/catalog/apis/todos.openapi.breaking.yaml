openapi: 3.0.3
info:
  title: Todos API
  version: 2.0.0
paths:
  /todos/{id}:
    get:
      responses:
        "200":
          description: Todo
          content:
            application/json:
              schema:
                type: object
                required:
                  - id
                  - title
                  - completed
                properties:
                  id:
                    type: integer
                  title:
                    type: string
                  completed:
                    type: string

