apiVersion: runtimeconditions.io/v1alpha1
kind: RuntimeConditionsExtensionDefinition

metadata:
  id: https://example.com/runtimeconditions/java/overlapping-field-a/v1alpha1/runtimeconditions.extension.yaml

spec:
  dependencies:
    - https://example.com/runtimeconditions/java/overlapping-field-base/v1alpha1/runtimeconditions.extension.yaml
  conditionFields:
    - name: configuration
      appliesToKinds:
        - java.field
      appliesToInterfaceTypes:
        - http
  fieldValues:
    - field: configuration.env[].property
      targetKind: java.field
      targetType: http
      values:
        - endpoint
