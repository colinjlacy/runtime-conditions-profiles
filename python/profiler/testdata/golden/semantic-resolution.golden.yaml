apiVersion: runtimeconditions.io/v1alpha1
kind: RuntimeConditionsProfile
metadata:
  name: python-semantic-resolution
workload:
  uri: example/python-semantic-resolution
  version: test
extensions:
- https://runtimeconditions.io/extensions/common-integrations/v1alpha1/runtimeconditions.extension.yaml
- https://runtimeconditions.io/extensions/env-configuration/v1alpha1/runtimeconditions.extension.yaml
conditions:
- name: users-api
  kind: api
  interface:
    type: http
    spec:
      format: openapi
      uri: catalog://api/default/users-api
      version: 1.0.0
    operations:
    - method: GET
      path: /users/{id}
      responseSchema:
        id: integer
        title: string
        completed: boolean
  configuration:
    env:
    - property: token
      name: AUTH_TOKEN
      sensitive: true
      required: false
- name: request-cache
  kind: cache
  interface:
    type: key_value
    engine: redis
  configuration:
    alternatives:
    - env:
      - property: url
        name: REDIS_URL
    - env:
      - property: hostname
        name: REDIS_HOST
      - property: port
        name: REDIS_PORT

