apiVersion: platform.kratix.io/v1alpha1
kind: Promise
metadata:
  name: application-release
  labels:
    kratix.io/promise-version: v0.1.0
spec:
  requiredPromises:
    - name: redis
      version: v0.1.0
  api:
    apiVersion: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    metadata:
      name: applicationreleases.platform.demoteam.io
    spec:
      group: platform.demoteam.io
      names:
        kind: ApplicationRelease
        plural: applicationreleases
        singular: applicationrelease
        shortNames:
          - ar
      scope: Namespaced
      versions:
        - name: v1alpha1
          served: true
          storage: true
          subresources:
            status: {}
          schema:
            openAPIV3Schema:
              type: object
              required:
                - spec
              properties:
                spec:
                  type: object
                  required:
                    - image
                    - profile
                  properties:
                    image:
                      type: string
                    imagePullPolicy:
                      type: string
                      default: Always
                    port:
                      type: integer
                      default: 8080
                    replicas:
                      type: integer
                      default: 1
                    readinessPath:
                      type: string
                      default: /ready
                    profile:
                      type: string
                    catalog:
                      type: object
                      properties:
                        configMapRef:
                          type: object
                          required:
                            - name
                            - namespace
                          properties:
                            name:
                              type: string
                            namespace:
                              type: string
  workflows:
    resource:
      configure:
        - apiVersion: platform.kratix.io/v1alpha1
          kind: Pipeline
          metadata:
            name: configure-application-release
          spec:
            rbac:
              permissions:
                - apiGroups: [""]
                  resources: ["configmaps"]
                  verbs: ["get"]
                  resourceNamespace: platform-demo-system
            containers:
              - name: resolver
                image: ghcr.io/colinjlacy/runtime-conditions-profiles-application-release-pipeline:latest
                imagePullPolicy: Always
